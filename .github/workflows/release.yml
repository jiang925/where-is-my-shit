name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]*'

jobs:
  validate-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend tests
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run backend tests
        run: uv run pytest

      # Frontend tests
      - name: Set up Node.js 20 for frontend
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Run frontend tests
        run: cd ui && npm run test -- --run

      # Extension lint
      - name: Install extension dependencies
        run: cd extension && npm ci

      - name: Lint extension
        run: cd extension && npm run lint

      # E2E tests
      - name: Install Playwright
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create test environment config
        run: cp .env.test.example .env.test

      - name: Run E2E tests
        run: npx playwright test --project=chromium

  version-sync:
    needs: validate-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Validate tag format
        run: |
          if [[ ! "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "Invalid tag format: must be YYYY.MM.DD or YYYY.MM.DD.N"
            exit 1
          fi

      - name: Update pyproject.toml version
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.version.outputs.VERSION }}"/' pyproject.toml

      - name: Update manifest.json version
        run: |
          cd extension
          jq --arg version "${{ steps.version.outputs.VERSION }}" \
             '.version = $version' \
             manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Validate version consistency
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          MANIFEST_VERSION=$(jq -r '.version' extension/manifest.json)

          ERRORS=()
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            ERRORS+=("pyproject.toml version ($PYPROJECT_VERSION) != tag ($TAG_VERSION)")
          fi
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            ERRORS+=("manifest.json version ($MANIFEST_VERSION) != tag ($TAG_VERSION)")
          fi

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "Version mismatch detected:"
            printf '%s\n' "${ERRORS[@]}"
            exit 1
          fi

          echo "Version consistency validated: $TAG_VERSION"

      - name: Show version sync status
        run: |
          echo "✅ Version synchronization complete"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "pyproject.toml: $(grep '^version = ' pyproject.toml | cut -d'"' -f2)"
          echo "manifest.json: $(jq -r '.version' extension/manifest.json)"
          echo ""
          echo "✅ Version management complete"
          echo ""
          echo "Note: Automated Docker publishing enabled with disk optimization."
          echo "Images published to ghcr.io/jiang925/wims on each release tag."

      - name: Upload versioned manifest for extension publishing
        uses: actions/upload-artifact@v4
        with:
          name: versioned-manifest
          path: extension/manifest.json
          retention-days: 1

  publish-extension:
    needs: version-sync
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - name: Download versioned manifest
        uses: actions/download-artifact@v4
        with:
          name: versioned-manifest
          path: extension/

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: cd extension && npm ci

      - name: Build extension
        run: cd extension && npm run build

      - name: Validate manifest.json exists
        run: |
          if [ ! -f extension/dist/manifest.json ]; then
            echo "Error: extension/dist/manifest.json not found after build"
            exit 1
          fi
          echo "✓ manifest.json exists"

      - name: Validate manifest.json is valid JSON
        run: |
          if ! jq empty extension/dist/manifest.json 2>/dev/null; then
            echo "Error: extension/dist/manifest.json is not valid JSON"
            exit 1
          fi
          echo "✓ manifest.json is valid JSON"

      - name: Validate manifest.json version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          MANIFEST_VERSION=$(jq -r '.version' extension/manifest.json)

          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ manifest.json version matches tag: $TAG_VERSION"

      - name: Validate required manifest fields
        run: |
          set -e
          echo "Validating required manifest.json fields..."

          # Check required fields exist and are non-empty
          jq -e '.name' extension/dist/manifest.json > /dev/null || { echo "Error: Missing 'name' field"; exit 1; }
          jq -e '.version' extension/dist/manifest.json > /dev/null || { echo "Error: Missing 'version' field"; exit 1; }
          jq -e '.manifest_version' extension/dist/manifest.json > /dev/null || { echo "Error: Missing 'manifest_version' field"; exit 1; }
          jq -e '.description' extension/dist/manifest.json > /dev/null || { echo "Error: Missing 'description' field"; exit 1; }
          jq -e '.icons' extension/dist/manifest.json > /dev/null || { echo "Error: Missing 'icons' field"; exit 1; }
          jq -e '.permissions' extension/dist/manifest.json > /dev/null || { echo "Error: Missing 'permissions' field"; exit 1; }

          echo "✓ All required manifest fields present"

      - name: Create extension zip
        run: |
          cd extension/dist
          zip -r ../../extension.zip . -x "*.DS_Store"
          cd ../..
          echo "✓ Created extension.zip"

      - name: Verify zip contents
        run: |
          if ! zipinfo extension.zip manifest.json > /dev/null 2>&1; then
            echo "Error: extension.zip does not contain manifest.json"
            exit 1
          fi
          echo "✓ extension.zip contains manifest.json"
          echo ""
          echo "Zip contents:"
          zipinfo -1 extension.zip | head -20

      - name: Upload to Chrome Web Store
        run: |
          echo "Uploading extension to Chrome Web Store..."
          npx chrome-webstore-upload-cli upload \
            --extension-id ${{ secrets.CHROME_EXTENSION_ID }} \
            --client-id ${{ secrets.CHROME_CLIENT_ID }} \
            --client-secret ${{ secrets.CHROME_CLIENT_SECRET }} \
            --refresh-token ${{ secrets.CHROME_REFRESH_TOKEN }} \
            --source extension.zip \
            --auto-publish

      - name: Display success message
        run: |
          echo ""
          echo "✅ Extension published successfully"
          echo "Extension ID: ${{ secrets.CHROME_EXTENSION_ID }}"
          echo "Version: ${{ github.ref_name }}"
          echo ""
          echo "The extension has been submitted to Chrome Web Store for review."
          echo "Review typically takes 24-48 hours."
          echo ""
          echo "Check status at: https://chrome.google.com/webstore/devconsole"

  publish-watcher:
    needs: version-sync
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Prepare watcher bundle
        run: |
          echo "Creating watcher tarball..."

          # Create bundle directory
          mkdir -p watcher-bundle/wims-watcher

          # Copy watcher source files
          cp -r wims-watcher/src watcher-bundle/wims-watcher/
          cp wims-watcher/requirements.txt watcher-bundle/wims-watcher/

          # Copy templates
          mkdir -p watcher-bundle/wims-watcher/templates
          cp wims-watcher/templates/* watcher-bundle/wims-watcher/templates/

          # Create VERSION file
          echo "${{ steps.version.outputs.VERSION }}" > watcher-bundle/wims-watcher/VERSION

          # Verify bundle structure
          echo "Bundle contents:"
          find watcher-bundle/wims-watcher -type f

          # Create tarball
          cd watcher-bundle
          tar -czf ../wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz wims-watcher/
          cd ..

          echo "✓ Created wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz"

      - name: Verify tarball
        run: |
          echo "Tarball contents:"
          tar -tzf wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz | head -20

          # Verify key files exist
          if ! tar -tzf wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz | grep -q "src/main.py"; then
            echo "Error: src/main.py not found in tarball"
            exit 1
          fi

          if ! tar -tzf wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz | grep -q "requirements.txt"; then
            echo "Error: requirements.txt not found in tarball"
            exit 1
          fi

          if ! tar -tzf wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz | grep -q "VERSION"; then
            echo "Error: VERSION file not found in tarball"
            exit 1
          fi

          echo "✓ Tarball structure validated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz
            install-watcher.sh
          body: |
            ## WIMS Release ${{ steps.version.outputs.VERSION }}

            ### Watcher Daemon

            Install or update the watcher daemon:
            ```bash
            curl -sSL https://raw.githubusercontent.com/jiang925/wims/${{ github.ref_name }}/install-watcher.sh | bash
            ```

            Update existing installation:
            ```bash
            wims-watcher update
            ```

            ### Chrome Extension

            The extension has been published to Chrome Web Store and will be available after review (typically 24-48 hours).

            ### What's Changed

            See [CHANGELOG.md](https://github.com/jiang925/wims/blob/main/CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display success message
        run: |
          echo ""
          echo "✅ Watcher daemon release created"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Tarball: wims-watcher-${{ steps.version.outputs.VERSION }}.tar.gz"
          echo ""
          echo "Install command:"
          echo "curl -sSL https://raw.githubusercontent.com/jiang925/wims/${{ github.ref_name }}/install-watcher.sh | bash"

  publish-docker:
    needs: version-sync
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Initial disk usage:"
          df -h
          echo ""

          echo "Removing large unused packages..."
          # Remove .NET, Android SDK, GHC, CodeQL (reclaims ~10-12GB)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          echo "Cleaning apt cache..."
          sudo apt-get clean

          echo "Pruning Docker system..."
          docker system prune -af --volumes

          echo ""
          echo "Final disk usage after cleanup:"
          df -h

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/jiang925/wims:${{ steps.version.outputs.VERSION }}
            ghcr.io/jiang925/wims:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Display success message
        run: |
          echo ""
          echo "✅ Docker image published successfully"
          echo "Images:"
          echo "  - ghcr.io/jiang925/wims:${{ steps.version.outputs.VERSION }}"
          echo "  - ghcr.io/jiang925/wims:latest"
          echo ""
          echo "Platform: linux/amd64"
          echo ""
          echo "Pull image:"
          echo "docker pull ghcr.io/jiang925/wims:${{ steps.version.outputs.VERSION }}"
