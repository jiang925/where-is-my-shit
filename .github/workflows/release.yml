name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]*'

jobs:
  validate-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend tests
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run backend tests
        run: uv run pytest

      # Frontend tests
      - name: Set up Node.js 20 for frontend
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Run frontend tests
        run: cd ui && npm run test -- --run

      # Extension lint
      - name: Install extension dependencies
        run: cd extension && npm ci

      - name: Lint extension
        run: cd extension && npm run lint

      # E2E tests
      - name: Install Playwright
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create test environment config
        run: cp .env.test.example .env.test

      - name: Run E2E tests
        run: npx playwright test --project=chromium

  version-sync:
    needs: validate-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Validate tag format
        run: |
          if [[ ! "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "Invalid tag format: must be YYYY.MM.DD or YYYY.MM.DD.N"
            exit 1
          fi

      - name: Update pyproject.toml version
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.version.outputs.VERSION }}"/' pyproject.toml

      - name: Update manifest.json version
        run: |
          cd extension
          jq --arg version "${{ steps.version.outputs.VERSION }}" \
             '.version = $version' \
             manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json

      - name: Validate version consistency
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          MANIFEST_VERSION=$(jq -r '.version' extension/manifest.json)

          ERRORS=()
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            ERRORS+=("pyproject.toml version ($PYPROJECT_VERSION) != tag ($TAG_VERSION)")
          fi
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            ERRORS+=("manifest.json version ($MANIFEST_VERSION) != tag ($TAG_VERSION)")
          fi

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "Version mismatch detected:"
            printf '%s\n' "${ERRORS[@]}"
            exit 1
          fi

          echo "Version consistency validated: $TAG_VERSION"

      - name: Show version sync status
        run: |
          echo "✅ Version synchronization complete"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "pyproject.toml: $(grep '^version = ' pyproject.toml | cut -d'"' -f2)"
          echo "manifest.json: $(jq -r '.version' extension/manifest.json)"
          echo ""
          echo "✅ Version management complete"
          echo ""
          echo "Note: Automated Docker publishing deferred due to GitHub Actions"
          echo "disk space limits (~14GB). Dockerfile and docker-compose.yml work"
          echo "for manual builds. Will revisit automation with self-hosted runner."
