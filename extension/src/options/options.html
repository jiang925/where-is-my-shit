<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WIMS Capture Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>WIMS Capture Settings</h1>

    <div class="setting">
      <label for="serverUrl">Server URL:</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:8000">
      <div class="help-text">URL of your WIMS server (e.g., http://localhost:8000)</div>
    </div>

    <div class="button-group">
      <button id="saveButton">Save Settings</button>
      <button id="testButton" class="secondary">Test Connection</button>
    </div>

    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
