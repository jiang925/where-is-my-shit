<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WIMS Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-container">
    <h1>WIMS Capture</h1>

    <!-- Configuration Warning -->
    <div id="configWarning" style="display: none; background-color: #fff3cd; color: #856404; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 13px;">
      API Key missing. <a href="#" id="openOptionsLink">Open Settings</a>
    </div>

    <!-- Main Content -->
    <div id="mainContent">
      <div class="toggle-section">
        <label class="toggle-label">
          <span>Capture Enabled</span>
          <label class="switch">
            <input type="checkbox" id="captureToggle">
            <span class="slider"></span>
          </label>
        </label>
      </div>

      <div class="status-section">
        <div class="status-item">
          <span class="status-label">Server:</span>
          <span class="status-value">
            <span class="status-dot" id="serverStatus"></span>
            <span id="serverStatusText">Checking...</span>
          </span>
        </div>

        <div class="status-item" id="queueSection" style="display: none;">
          <span class="status-label">Queued:</span>
          <span class="status-value" id="queueCount">0</span>
        </div>

        <div class="status-item">
          <span class="status-label">Last capture:</span>
          <span class="status-value" id="lastCapture">Never</span>
        </div>
      </div>

      <!-- Import History -->
      <div id="importSection" class="import-section" style="display: none;">
        <div class="recent-header">Import History</div>
        <div id="importContent">
          <button id="importBtn" class="import-btn">
            <span id="importPlatformIcon" class="platform-badge"></span>
            <span id="importBtnText">Import All Chats</span>
          </button>
        </div>
        <div id="importProgress" style="display: none;">
          <div class="import-progress-text" id="importProgressText">Starting...</div>
          <div class="import-progress-bar-container">
            <div class="import-progress-bar" id="importProgressBar"></div>
          </div>
          <button id="importCancelBtn" class="import-cancel-btn">Cancel</button>
        </div>
        <div id="importResult" style="display: none;"></div>
      </div>

      <!-- Quick Search -->
      <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search WIMS... (Enter)" autocomplete="off">
      </div>

      <!-- Recent Captures -->
      <div class="recent-section">
        <div class="recent-header">Recent Captures</div>
        <div id="recentList" class="recent-list"></div>
        <a href="#" id="seeAllLink" class="see-all-link" style="display: none;">See all in WIMS</a>
      </div>

      <!-- Bottom Actions -->
      <div class="actions">
        <button id="openWimsBtn" class="open-wims-btn">Open WIMS</button>
        <a href="#" id="openOptions">Settings</a>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
